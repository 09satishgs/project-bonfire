name: Sync Directory Fallback

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-directory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download directory CSV
        env:
          DIRECTORY_SHEET_ID: ${{ secrets.DIRECTORY_SHEET_ID }}
        run: |
          mkdir -p public/data
          curl -fsSL "https://docs.google.com/spreadsheets/d/${DIRECTORY_SHEET_ID}/export?format=csv" -o public/data/fallback-directory.csv

      - name: Commit and push changes
        run: |
          if git status --short -- public/data/fallback-directory.csv | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/fallback-directory.csv
            git commit -m "chore: auto-sync directory fallback [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes detected."
          fi
